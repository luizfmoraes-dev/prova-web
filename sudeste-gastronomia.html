<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabores do Sudeste - Guatá</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="internas">
    <header>
        <nav>
            <div class="logo-container">
                <a href="index.html"><img src="assets/Guatá.png" class="logo"></a>
            </div>
            <ul class="navegation">
                <li class="nav-item"><a class="item" href="index.html">Voltar ao Início</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-container">
        <section class="explore">
            <h2>Delícias do Sudeste</h2>
            <ul class="food-list">
                <li>
                    <article class="food-card">
                        <header class="food-content">
                            <img src="assets/pastel_de_vento.png">
                            <h3>Pastel de Vento</h3>
                            <small>São Paulo - SP</small>
                            <p>A tradição das feiras paulistas que conquistou o Brasil inteiro.</p>
                        </header>
                    </article>
                </li>
                <li>
                    <article class="food-card">
                        <header class="food-content">
                            <img src="assets/feijoada.png">
                        </header>
                        <div class="food-content">
                            <h3>Feijoada Carioca</h3>
                            <small>Rio de Janeiro - RJ</small>
                            <p>O prato que simboliza a união e a história da mesa brasileira.</p>
                        </div>
                    </article>
                </li>
            </ul>
        </section>
    </main>
</body>
</html>
